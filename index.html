<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>junodream</title>
  <meta name="description" content="The official website of junodream. Dream-rock music about alienation in the 21st century.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="site-header__inner">
      <a href="index.html" class="site-logo">junodream</a>
      <nav class="site-nav">
        <a href="live.html">Live</a>
        <a href="music.html">Music</a>
        <a href="videos.html">Videos</a>
        <a href="store.html">Store</a>
        <a href="signup.html">Sign Up</a>
      </nav>
      <button class="hamburger" aria-label="Menu" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <nav class="mobile-nav" id="mobileNav">
    <a href="live.html" onclick="closeMenu()">Live</a>
    <a href="music.html" onclick="closeMenu()">Music</a>
    <a href="videos.html" onclick="closeMenu()">Videos</a>
    <a href="store.html" onclick="closeMenu()">Store</a>
    <a href="signup.html" onclick="closeMenu()">Sign Up</a>
  </nav>

  <div class="home-bg">
    <img src="images/bg-desktop.png" alt="junodream - i dream of the universe" class="desktop">
    <img src="images/bg-mobile.png" alt="junodream - i dream of the universe" class="mobile">
  </div>

  <script>
    function toggleMenu() {
      document.querySelector('.hamburger').classList.toggle('open');
      document.getElementById('mobileNav').classList.toggle('open');
      document.body.style.overflow = document.getElementById('mobileNav').classList.contains('open') ? 'hidden' : '';
    }

    function closeMenu() {
      document.querySelector('.hamburger').classList.remove('open');
      document.getElementById('mobileNav').classList.remove('open');
      document.body.style.overflow = '';
    }
  </script>

</body>
</html>
