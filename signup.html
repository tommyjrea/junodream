<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sign up — junodream</title>
  <meta name="description" content="Subscribe to the junodream mailing list for exclusive news and offers.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="site-header__inner">
      <a href="index.html" class="site-logo">junodream</a>
      <nav class="site-nav">
        <a href="live.html">Live</a>
        <a href="music.html">Music</a>
        <a href="videos.html">Videos</a>
        <a href="store.html">Store</a>
        <a href="signup.html" class="active">Sign Up</a>
      </nav>
      <button class="hamburger" aria-label="Menu" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <nav class="mobile-nav" id="mobileNav">
    <a href="live.html" onclick="closeMenu()">Live</a>
    <a href="music.html" onclick="closeMenu()">Music</a>
    <a href="videos.html" onclick="closeMenu()">Videos</a>
    <a href="store.html" onclick="closeMenu()">Store</a>
    <a href="signup.html" onclick="closeMenu()">Sign Up</a>
  </nav>

  <main class="page-content">
    <div class="signup-section">
      <h2 data-drip-attribute="headline">join the mailing list</h2>
      <p data-drip-attribute="description">sign up for exclusive news, tour dates and offers from junodream.</p>

      <form action="https://www.getdrip.com/forms/783217451/submissions" method="post" data-drip-embedded-form="783217451" class="signup-form">
        <input type="email" name="fields[email]" placeholder="your email address" required aria-label="Email address">
        <button type="submit">subscribe</button>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    &copy; junodream 2026
  </footer>

  <script>
    function toggleMenu() {
      document.querySelector('.hamburger').classList.toggle('open');
      document.getElementById('mobileNav').classList.toggle('open');
      document.body.style.overflow = document.getElementById('mobileNav').classList.contains('open') ? 'hidden' : '';
    }
    function closeMenu() {
      document.querySelector('.hamburger').classList.remove('open');
      document.getElementById('mobileNav').classList.remove('open');
      document.body.style.overflow = '';
    }
  </script>

</body>
</html>
