<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>live — junodream</title>
  <meta name="description" content="See junodream live. Tour dates and tickets.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="site-header__inner">
      <a href="index.html" class="site-logo">junodream</a>
      <nav class="site-nav">
        <a href="live.html" class="active">Live</a>
        <a href="music.html">Music</a>
        <a href="videos.html">Videos</a>
        <a href="store.html">Store</a>
        <a href="signup.html">Sign Up</a>
      </nav>
      <button class="hamburger" aria-label="Menu" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <nav class="mobile-nav" id="mobileNav">
    <a href="live.html" onclick="closeMenu()">Live</a>
    <a href="music.html" onclick="closeMenu()">Music</a>
    <a href="videos.html" onclick="closeMenu()">Videos</a>
    <a href="store.html" onclick="closeMenu()">Store</a>
    <a href="signup.html" onclick="closeMenu()">Sign Up</a>
  </nav>

  <main class="page-content">
    <h1 class="page-title">live</h1>

    <div class="live-embed">
      <a href="https://www.songkick.com/artists/9361909" class="songkick-widget" data-theme="light" data-track-button="on" data-detect-style="off" data-locale="en" data-other-artists="on" data-share-button="on" data-country-filter="on" data-rsvp="on" data-request-show="on" data-past-events="off" data-past-events-offtour="off" data-remind-me="off" style="display: none;"></a>
    </div>
  </main>

  <style>
    /* Additional inline overrides to ensure Songkick matches our style */
    .live-embed .bit-widget-container,
    .live-embed .bit-widget-container * {
      font-family: 'Alte Haas Grotesk', sans-serif !important;
      letter-spacing: -0.05em !important;
    }
    .live-embed .bit-widget-container {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      max-width: 100% !important;
    }
    .live-embed .bit-top-track-button,
    .live-embed .bit-subscribe-button {
      background: #000 !important;
      color: #fff !important;
      border: 1px solid #000 !important;
      border-radius: 0 !important;
      text-transform: lowercase !important;
      font-weight: 400 !important;
      padding: 10px 24px !important;
      font-size: 14px !important;
    }
    .live-embed .bit-top-track-button:hover,
    .live-embed .bit-subscribe-button:hover {
      background: transparent !important;
      color: #000 !important;
    }
    .live-embed .bit-event {
      border-bottom: 1px solid #eee !important;
      border-top: none !important;
      padding: 20px 0 !important;
    }
    .live-embed .bit-rsvp,
    .live-embed .bit-tickets {
      background: transparent !important;
      color: #000 !important;
      border: 1px solid #000 !important;
      border-radius: 0 !important;
      text-transform: lowercase !important;
      font-weight: 400 !important;
    }
    .live-embed .bit-rsvp:hover,
    .live-embed .bit-tickets:hover {
      background: #000 !important;
      color: #fff !important;
    }
    .live-embed .bit-no-events {
      color: #999 !important;
      font-size: 16px !important;
    }
    .live-embed .bit-logo { opacity: 0.3 !important; }
    .live-embed .bit-request-show a {
      color: #000 !important;
      text-decoration: underline !important;
    }
  </style>

  <script src="//widget-app.songkick.com/injector/9361909"></script>

  <footer class="site-footer">
    &copy; junodream 2026
  </footer>

  <script>
    function toggleMenu() {
      document.querySelector('.hamburger').classList.toggle('open');
      document.getElementById('mobileNav').classList.toggle('open');
      document.body.style.overflow = document.getElementById('mobileNav').classList.contains('open') ? 'hidden' : '';
    }
    function closeMenu() {
      document.querySelector('.hamburger').classList.remove('open');
      document.getElementById('mobileNav').classList.remove('open');
      document.body.style.overflow = '';
    }
  </script>

</body>
</html>
